<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DOM Manipulation – Complete Guide</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .highlight {
      color: white;
      background: green;
      padding: 5px;
    }

    .box {
      width: 120px;
      height: 120px;
      background: lightblue;
      margin: 10px 0;
    }
  </style>
</head>
<body>

  <!-- ===================================================
       BASIC HTML STRUCTURE
  =================================================== -->

  <h1 id="title">DOM Manipulation in JavaScript</h1>

  <p class="info">Learning how JavaScript interacts with HTML</p>

  <button id="btn">Click Me</button>

  <div class="box"></div>

  <ul id="list">
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>
  </ul>

  <input type="text" id="input" placeholder="Type something..." />

  <!-- ===================================================
       JAVASCRIPT STARTS HERE
  =================================================== -->

  <script>
    /***************************************************
     * 1. SELECTING ELEMENTS
     ***************************************************/

    // Select by ID
    const title = document.getElementById("title");

    // Select by class (returns HTMLCollection)
    const info = document.getElementsByClassName("info")[0];

    // Select by tag
    const listItems = document.getElementsByTagName("li");

    // Modern selectors (recommended)
    const button = document.querySelector("#btn");
    const box = document.querySelector(".box");
    const input = document.querySelector("#input");

    /***************************************************
     * 2. READING & CHANGING CONTENT
     ***************************************************/

    console.log(title.textContent); // Read text
    title.textContent = "DOM Manipulation (Updated)";

    // innerHTML allows HTML tags
    info.innerHTML = "<strong>JavaScript controls the DOM</strong>";

    /***************************************************
     * 3. STYLING ELEMENTS
     ***************************************************/

    title.style.color = "blue";
    box.style.border = "2px solid black";

    /***************************************************
     * 4. ADD / REMOVE / TOGGLE CLASSES
     ***************************************************/

    title.classList.add("highlight");
    title.classList.remove("highlight");
    title.classList.toggle("highlight");

    /***************************************************
     * 5. ATTRIBUTES
     ***************************************************/

    input.setAttribute("placeholder", "Enter text here");
    console.log(input.getAttribute("placeholder"));
    input.removeAttribute("placeholder");

    /***************************************************
     * 6. EVENTS
     ***************************************************/

    button.addEventListener("click", function () {
      alert("Button clicked!");
      box.classList.toggle("highlight");
    });

    /***************************************************
     * 7. KEYBOARD EVENTS
     ***************************************************/

    input.addEventListener("keyup", function (event) {
      console.log("Typed:", event.target.value);
    });

    /***************************************************
     * 8. LOOPING THROUGH ELEMENTS
     ***************************************************/

    for (let item of listItems) {
      item.style.color = "purple";
    }

    /***************************************************
     * 9. CREATING & ADDING ELEMENTS
     ***************************************************/

    const newItem = document.createElement("li");
    newItem.textContent = "DOM";
    document.getElementById("list").appendChild(newItem);

    /***************************************************
     * 10. REMOVING ELEMENTS
     ***************************************************/

    // Remove last item after 3 seconds
    setTimeout(() => {
      newItem.remove();
    }, 3000);

    /***************************************************
     * 11. TRAVERSING THE DOM
     ***************************************************/

    const list = document.getElementById("list");
    console.log(list.parentElement);     // Parent
    console.log(list.children);          // Children
    console.log(list.firstElementChild); // First child
    console.log(list.lastElementChild);  // Last child

    /***************************************************
     * 12. FORM BASIC VALIDATION
     ***************************************************/

    button.addEventListener("click", () => {
      if (input.value === "") {
        alert("Input cannot be empty!");
      }
    });

    /***************************************************
     * 13. WINDOW & DOCUMENT OBJECT
     ***************************************************/

    console.log(window.innerWidth);
    console.log(document.title);

    document.title = "DOM Learning Complete";

    /***************************************************
     * 14. SUMMARY
     ***************************************************
     * You learned:
     * ✔ Selecting elements
     * ✔ Changing content
     * ✔ Styling
     * ✔ Events
     * ✔ Creating / removing elements
     * ✔ Traversing DOM
     ***************************************************/
  </script>

</body>
</html>
