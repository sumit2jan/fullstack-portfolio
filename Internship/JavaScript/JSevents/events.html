<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JavaScript Events – Complete Guide</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      cursor: pointer;
    }

    .box {
      width: 150px;
      height: 150px;
      background: lightcoral;
      margin-top: 15px;
    }

    .active {
      background: green;
      color: white;
    }
  </style>
</head>
<body>

  <!-- =================================================
       BASIC HTML ELEMENTS
  ================================================= -->

  <h1>JavaScript Events</h1>

  <button id="clickBtn">Click Event</button>
  <button id="dblClickBtn">Double Click</button>

  <input type="text" id="textInput" placeholder="Type something" />

  <div class="box" id="box"></div>

  <form id="myForm">
    <input type="text" id="name" placeholder="Enter name" />
    <button type="submit">Submit</button>
  </form>

  <!-- =================================================
       JAVASCRIPT STARTS HERE
  ================================================= -->

  <script>
    /*************************************************
     * 1. WHAT IS AN EVENT?
     *************************************************
     * An event is an action performed by the user or browser.
     * Examples:
     * - click
     * - keypress
     * - mouseover
     * - submit
     * - load
     */

    /*************************************************
     * 2. CLICK EVENT
     *************************************************/

    const clickBtn = document.getElementById("clickBtn");

    clickBtn.addEventListener("click", function () {
      alert("Button was clicked!");
    });

    /*************************************************
     * 3. DOUBLE CLICK EVENT
     *************************************************/

    document.getElementById("dblClickBtn")
      .addEventListener("dblclick", () => {
        alert("Double click event triggered!");
      });

    /*************************************************
     * 4. MOUSE EVENTS
     *************************************************/

    const box = document.getElementById("box");

    // mouseover
    box.addEventListener("mouseover", () => {
      box.style.background = "lightblue";
    });

    // mouseout
    box.addEventListener("mouseout", () => {
      box.style.background = "lightcoral";
    });

    /*************************************************
     * 5. KEYBOARD EVENTS
     *************************************************/

    const textInput = document.getElementById("textInput");

    // keydown
    textInput.addEventListener("keydown", (event) => {
      console.log("Key pressed:", event.key);
    });

    // keyup
    textInput.addEventListener("keyup", () => {
      console.log("Current value:", textInput.value);
    });

    /*************************************************
     * 6. EVENT OBJECT
     *************************************************/

    clickBtn.addEventListener("click", (event) => {
      console.log(event.type);    // click
      console.log(event.target);  // element that triggered event
    });

    /*************************************************
     * 7. FORM EVENTS
     *************************************************/

    const form = document.getElementById("myForm");

    form.addEventListener("submit", function (event) {
      event.preventDefault(); // stop page refresh
      alert("Form submitted successfully!");
    });

    /*************************************************
     * 8. CHANGE EVENT
     *************************************************/

    textInput.addEventListener("change", () => {
      console.log("Input changed:", textInput.value);
    });

    /*************************************************
     * 9. EVENT BUBBLING (DEFAULT)
     *************************************************/

    document.body.addEventListener("click", () => {
      console.log("Body clicked (bubbling)");
    });

    clickBtn.addEventListener("click", () => {
      console.log("Button clicked (bubbling)");
    });

    /*************************************************
     * 10. EVENT CAPTURING
     *************************************************/

    document.body.addEventListener("click", () => {
      console.log("Body clicked (capturing)");
    }, true);

    /*************************************************
     * 11. STOP EVENT PROPAGATION
     *************************************************/

    clickBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      console.log("Propagation stopped");
    });

    /*************************************************
     * 12. ADD & REMOVE EVENT LISTENER
     *************************************************/

    function highlightBox() {
      box.classList.toggle("active");
    }

    box.addEventListener("click", highlightBox);

    // Remove event after 5 seconds
    setTimeout(() => {
      box.removeEventListener("click", highlightBox);
      console.log("Click event removed from box");
    }, 5000);

    /*************************************************
     * 13. WINDOW EVENTS
     *************************************************/

    window.addEventListener("load", () => {
      console.log("Page fully loaded");
    });

    window.addEventListener("resize", () => {
      console.log("Window resized:", window.innerWidth);
    });

    /*************************************************
     * 14. EVENT DELEGATION
     *************************************************/

    document.body.addEventListener("click", (event) => {
      if (event.target.tagName === "BUTTON") {
        console.log("Button clicked using delegation:", event.target.innerText);
      }
    });

    /*************************************************
     * 15. SUMMARY
     *************************************************
     * You learned:
     * ✔ Click, mouse, keyboard events
     * ✔ Event object
     * ✔ Form events
     * ✔ Bubbling & capturing
     * ✔ stopPropagation
     * ✔ add/removeEventListener
     * ✔ Event delegation
     *************************************************/
  </script>

</body>
</html>
